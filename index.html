<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness OS — Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #f59e0b;
    --accent-dim: rgba(245,158,11,0.15);
    --radius: 14px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Mono', 'Cascadia Code', monospace;
  }

  /* ── Background ───────────────────────────────────────── */
  body {
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: center;
    background: #0a0a0a url('background.jpg') center / cover no-repeat fixed;
    color: #f0ede8;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Dark overlay so text stays readable */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.62);
    z-index: 0;
  }

  /* ── Layout ───────────────────────────────────────────── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 16px;
    width: 100%;
  }

  /* ── Week Badge — fixed viewport top-right ────────────── */
  .week-badge {
    position: fixed;
    top: 20px;
    right: 24px;
    text-align: right;
    line-height: 1.2;
    z-index: 100;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 16px;
  }
  .week-badge-label {
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 2px;
  }
  .week-badge-number {
    font-size: 21px;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }
  .week-badge-sub {
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(255,255,255,0.40);
    display: block;
    margin-top: 2px;
  }

  /* ── Header ───────────────────────────────────────────── */
  .header {
    margin-bottom: 48px;
    text-align: center;
  }
  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: block;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #ffffff;
    letter-spacing: -0.02em;
  }
  .header p {
    color: rgba(255,255,255,0.55);
    font-size: 16px;
  }

  /* ── Navigation Cards ─────────────────────────────────── */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  @media(max-width: 600px) {
    .nav-grid { grid-template-columns: 1fr; }
    .week-badge { top: 12px; right: 12px; padding: 8px 12px; }
    .week-badge-number { font-size: 17px; }
  }

  .nav-card {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: var(--radius);
    padding: 44px 24px;
    text-decoration: none;
    color: #f0ede8;
    transition: all 0.22s ease;
  }

  .nav-card:hover {
    background: rgba(255, 255, 255, 0.13);
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(245,158,11,0.25);
  }

  .nav-card .icon {
    font-size: 40px;
    margin-bottom: 18px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }

  .nav-card h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #ffffff;
  }

  .nav-card p {
    font-size: 13px;
    color: rgba(255,255,255,0.50);
    text-align: center;
  }
</style>
</head>
<body>

<!-- Week badge — fixed top-right corner of screen -->
<div class="week-badge">
  <span class="week-badge-label">Program Week</span>
  <span class="week-badge-number" id="week-num">Week —</span>
  <span class="week-badge-sub" id="week-sub"></span>
</div>

<div class="container">
  <div class="header">
    <span class="header-label">Fitness OS • Core</span>
    <h1>My Fitness Journey</h1>
    <p>7-Month Body Recomposition Dashboard</p>
  </div>

  <div class="nav-grid">
    <a href="workout.html" class="nav-card">
      <div class="icon">🏋️‍♂️</div>
      <h2>Workout Plan</h2>
      <p>Mesocycle 1 Training Engine & Progression</p>
    </a>

    <a href="nutrition.html" class="nav-card">
      <div class="icon">🥗</div>
      <h2>Nutrition Plan</h2>
      <p>Daily Macros, Meal Prep & Supplement Stack</p>
    </a>
  </div>
</div>

<script>
  var PROGRAM_START = '2026-03-23T00:00:00';

  function getCurrentWeek() {
    var nowNDT   = new Date(new Date().toLocaleString('en-US', {timeZone: 'America/St_Johns'}));
    var startNDT = new Date(new Date(PROGRAM_START).toLocaleString('en-US', {timeZone: 'America/St_Johns'}));
    var diff = Math.floor((nowNDT - startNDT) / (7 * 24 * 60 * 60 * 1000));
    return Math.max(1, diff + 1);
  }

  function getMesocycleWeek(w) { return ((w - 1) % 4) + 1; }
  function getMesocycleNumber(w) { return Math.ceil(w / 4); }

  function updateWeekBadge() {
    var w  = getCurrentWeek();
    var mw = getMesocycleWeek(w);
    var mc = getMesocycleNumber(w);
    document.getElementById('week-num').textContent = 'Week ' + w;
    document.getElementById('week-sub').textContent = 'MC' + mc + ' · W' + mw + ' of 4';
  }

  updateWeekBadge();
  setInterval(updateWeekBadge, 60000);
</script>
</body>
</html>
